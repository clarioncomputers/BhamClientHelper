name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore
        run: nuget restore Bham.HelperClient.sln

      - name: Build
        run: msbuild Bham.HelperClient.sln /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Test
        shell: pwsh
        run: |
          [Reflection.Assembly]::LoadFrom("$PWD\Bham.BizTalk.Rest.Tests\bin\Release\Bham.BizTalk.Rest.Tests.dll") | Out-Null
          [Bham.BizTalk.Rest.Tests.TestRunner]::RunAll()
